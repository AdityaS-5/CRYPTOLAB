{% extends "base.html" %}
{% block content %}

<h2>🔐 AES Cipher</h2>
<p class="subtitle">AES-128 Encryption / Decryption with full round tracing</p>

<div class="card wide-card">
    <form method="post" class="form-grid">

        <label>Text / Ciphertext</label>
        <input type="text" name="text" required>

        <label>Key (128-bit hex or binary)</label>
        <input type="text" name="key" placeholder="32 hex chars or 128-bit binary" required>

        <label>Mode</label>
        <select name="mode">
            <option value="ECB">ECB</option>
            <option value="CBC">CBC</option>
        </select>

        <div class="btn-row">
            <button class="btn primary" name="action" value="ENCRYPT">Encrypt</button>
            <button class="btn danger" name="action" value="DECRYPT">Decrypt</button>
        </div>

    </form>
</div>

<a href="/ex2" class="btn ghost">⬅ Back to Exercise 2</a>

{% endblock %}
