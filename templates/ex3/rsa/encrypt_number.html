{% extends "base.html" %}
{% block content %}

<h2>🔒 RSA Number Encryption</h2>
<p class="subtitle">Encrypt a numerical message using RSA public key</p>

<div class="card wide-card">
    <form method="post" class="form-grid">

        <label>Message (Integer)</label>
        <input type="number" name="message" placeholder="Enter message number (must be < n)" required>

        <label>Public Exponent (e)</label>
        <input type="number" name="e" placeholder="Enter public exponent e (e.g., 17)" required>

        <label>Modulus (n)</label>
        <input type="number" name="n" placeholder="Enter modulus n (e.g., 3233)" required>

        <div class="btn-row">
            <button class="btn primary">Encrypt</button>
        </div>

    </form>
</div>

<div class="info-box">
    <h4>ℹ️ RSA Encryption Formula:</h4>
    <p><strong>c ≡ m<sup>e</sup> mod n</strong></p>
    <ul>
        <li><strong>m:</strong> Plaintext message (< n)</li>
        <li><strong>e:</strong> Public exponent</li>
        <li><strong>n:</strong> Modulus</li>
        <li><strong>c:</strong> Ciphertext</li>
    </ul>
</div>

<a href="/ex3/rsa" class="btn ghost">⬅ Back to RSA Menu</a>

{% endblock %}
